services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: platformdb
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platformpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platformdb"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - platform-net

  # ── Keycloak ───────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # KC_HOSTNAME: token'lardaki iss claim'ini sabitler → localhost:8080
      # Mac ve Linux Docker arasında tutarlı issuer sağlar
      # MetadataAddress zaten keycloak:8080'i kullanıyor (iç DNS), bu değişmez
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./keycloak/realm-platform.json:/opt/keycloak/data/import/realm-platform.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/master HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - platform-net

  # ── ClamAV (virus/malware tarama, fail-closed) ─────────────────────────────
  # clamav-debian (clamav/clamav DEĞİL) kullanılıyor — arm64 destekliyor (ARM64
  # UTM VM'lerinde çalışmak için gerekli, clamav/clamav sadece amd64 sağlıyor).
  clamav:
    image: clamav/clamav-debian:stable
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - platform-net

  # ── FileServiceApi ─────────────────────────────────────────────────────────
  fileservice:
    build:
      context: ./FileServiceApi
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PlatformDb: "Host=postgres;Database=platformdb;Username=platform;Password=platformpass"
      # StagingPath/ExportPath artık kullanılmıyor — yazma FilesPublisher'a taşındı,
      # FileServiceApi bu mount'u sadece OKUMA için kullanıyor.
      FileStorage__ReadPath:    "/app/storage/export"
      Keycloak__Authority: "http://localhost:8080/realms/platform"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/platform/.well-known/openid-configuration"
      Keycloak__RequireHttpsMetadata: "false"
      Mtls__ServerCertPath: "/certs/fileservice.crt"
      Mtls__ServerKeyPath:  "/certs/fileservice.key"
      Mtls__CaCertPath:     "/certs/ca.crt"
      Mtls__AllowedClientCNs__0: "yonetimapi"
      Mtls__AllowedClientCNs__1: "filoapi"
      Mtls__AllowedClientCNs__2: "gateway"
      FilesPublisher__BaseUrl:       "${FILES_PUBLISHER_URL:-https://192.168.64.3:6060}"
      FilesPublisher__ClientCertPath: "/certs/fileservice-client.crt"
      FilesPublisher__ClientKeyPath:  "/certs/fileservice-client.key"
      FilesPublisher__CaCertPath:     "/certs/ca.crt"
      ClamAv__Host: "clamav"
      ClamAv__Port: "3310"
    volumes:
      # :ro — FileServiceApi artık dosya yazmıyor (upload FilesPublisher'a taşındı),
      # bu mount sadece stream/read için kullanılıyor. Container seviyesinde salt-okunur.
      - ${STORAGE_PATH:-/Volumes/platform-files}:/app/storage:ro
      - ./certs/fileservice.crt:/certs/fileservice.crt:ro
      - ./certs/fileservice.key:/certs/fileservice.key:ro
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./certs/fileservice-client.crt:/certs/fileservice-client.crt:ro
      - ./certs/fileservice-client.key:/certs/fileservice-client.key:ro
    healthcheck:
      # HTTPS+mTLS gerektirdiği için sadece TCP port kontrolü (Kestrel çöktüyse port hiç açık olmaz).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      clamav:
        condition: service_started
    networks:
      - platform-net

  # ── YonetimApi ─────────────────────────────────────────────────────────────
  yonetimapi:
    build:
      context: ./YonetimApi
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PlatformDb: "Host=postgres;Database=platformdb;Username=platform;Password=platformpass"
      FileService__BaseUrl: "https://fileservice:8080"
      Keycloak__Authority: "http://localhost:8080/realms/platform"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/platform/.well-known/openid-configuration"
      Keycloak__TokenUrl: "http://keycloak:8080/realms/platform/protocol/openid-connect/token"
      Keycloak__ClientId: "yonetimapi"
      Keycloak__ClientSecret: "yonetimapi-secret-v1"
      Keycloak__FrontendClientId: "frontend-test"
      Keycloak__RequireHttpsMetadata: "false"
      Mtls__ClientCertPath: "/certs/yonetimapi.crt"
      Mtls__ClientKeyPath:  "/certs/yonetimapi.key"
      Mtls__CaCertPath:     "/certs/ca.crt"
    volumes:
      - ./certs/yonetimapi.crt:/certs/yonetimapi.crt:ro
      - ./certs/yonetimapi.key:/certs/yonetimapi.key:ro
      - ./certs/ca.crt:/certs/ca.crt:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      fileservice:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - platform-net

  # ── FlotaApi ───────────────────────────────────────────────────────────────
  flotaapi:
    build:
      context: ./FlotaApi
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PlatformDb: "Host=postgres;Database=platformdb;Username=platform;Password=platformpass"
      FileService__BaseUrl: "https://fileservice:8080"
      Keycloak__Authority: "http://localhost:8080/realms/platform"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/platform/.well-known/openid-configuration"
      Keycloak__TokenUrl: "http://keycloak:8080/realms/platform/protocol/openid-connect/token"
      Keycloak__ClientId: "filoapi"
      Keycloak__ClientSecret: "filoapi-secret"
      Keycloak__RequireHttpsMetadata: "false"
      Mtls__ClientCertPath: "/certs/filoapi.crt"
      Mtls__ClientKeyPath:  "/certs/filoapi.key"
      Mtls__CaCertPath:     "/certs/ca.crt"
    volumes:
      - ./certs/filoapi.crt:/certs/filoapi.crt:ro
      - ./certs/filoapi.key:/certs/filoapi.key:ro
      - ./certs/ca.crt:/certs/ca.crt:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      fileservice:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - platform-net

  # ── OpsApi ────────────────────────────────────────────────────────────────
  opsapi:
    build:
      context: ./OpsApi
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Keycloak__Authority: "http://localhost:8080/realms/platform"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/platform/.well-known/openid-configuration"
      Keycloak__RequireHttpsMetadata: "false"
      ConnectionStrings__PlatformDb: "Host=postgres;Database=platformdb;Username=platform;Password=platformpass"
      STATUS_ROOT: "/ops/status-files"
      AUDIT_ROOT: "/ops/audit"
      BACKUP_RETAIN: "${BACKUP_RETAIN:-14}"
      GIT_COMMIT: "${GIT_COMMIT:-unknown}"
      GIT_BRANCH: "${GIT_BRANCH:-unknown}"
      BUILD_VERSION: "${BUILD_VERSION:-dev}"
      BUILD_TIME: "${BUILD_TIME:-unknown}"
    volumes:
      - /backup/platform-files:/ops/status-files:ro
      - /var/log/platform-ops:/ops/audit
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - platform-net

  # ── Client (React SPA) ────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - platform-net

  # ── Gateway (Nginx) ────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5090:443"
    volumes:
      - ./certs/gateway.crt:/etc/nginx/certs/gateway.crt:ro
      - ./certs/gateway.key:/etc/nginx/certs/gateway.key:ro
      - ./certs/gateway-client.crt:/etc/nginx/certs/gateway-client.crt:ro
      - ./certs/gateway-client.key:/etc/nginx/certs/gateway-client.key:ro
      - ./certs/ca.crt:/etc/nginx/certs/ca.crt:ro
      # X-Accel-Redirect için: host'ta zaten NFS ile mount edilmiş, salt-okunur
      # export dizininin aynısı — Gateway'e AYRI bir NFS bağlantısı açılmıyor,
      # api-server'ın mevcut (ro) mount'u container'a bind-mount ediliyor.
      - ${STORAGE_PATH:-/Volumes/platform-files}/export:/protected-files:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --no-check-certificate https://127.0.0.1:443/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      yonetimapi:
        condition: service_healthy
      flotaapi:
        condition: service_healthy
      opsapi:
        condition: service_healthy
      fileservice:
        condition: service_healthy
      client:
        condition: service_healthy
    networks:
      - platform-net

networks:
  platform-net:
    driver: bridge

volumes:
  postgres_data:
  clamav_data:

# Gateway: nginx:alpine — nginx/nginx.conf ile konfigüre edilir. Build adımı yok.
# .NET servisleri (FileServiceApi, YonetimApi, FlotaApi) container içinde çalışır.
# Keycloak: host localhost:8080 üzerinden erişilebilir (token alma).
# Servisler arası iletişim: Docker network içinde servis adı ile (keycloak, fileservice, vb).
# JWT issuer: localhost:8080 (token'daki iss claim) — MetadataAddress ile JWKS keycloak:8080'den çekilir.
