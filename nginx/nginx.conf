events {
    worker_connections 1024;
}

http {
    proxy_connect_timeout  10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    upstream yonetimapi {
        server yonetimapi:8080;
    }

    upstream flotaapi {
        server flotaapi:8080;
    }

    server {
        listen 80;
        server_name _;

        # Upstream hata yanıtlarını JSON olarak dön
        error_page 502 = @upstream_down;
        error_page 503 = @upstream_down;
        error_page 504 = @upstream_timeout;

        location @upstream_down {
            default_type application/json;
            return 502 '{"error":"upstream_unavailable","reason":"service_unavailable"}';
        }

        location @upstream_timeout {
            default_type application/json;
            return 504 '{"error":"upstream_timeout","reason":"gateway_timeout"}';
        }

        # Güvenlik: FileServiceApi iç endpoint'leri asla dışarıya açılmaz
        location /internal/ {
            return 404;
        }

        # Personnel — YonetimApi
        location /api/personnel {
            proxy_pass          http://yonetimapi;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            client_max_body_size    20m;
            proxy_request_buffering off;
            proxy_buffering         off;
        }

        # Vehicles — FlotaApi
        location /api/vehicles {
            proxy_pass          http://flotaapi;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            client_max_body_size    25m;
            proxy_request_buffering off;
            proxy_buffering         off;
        }

        # Health check
        location = /health {
            default_type application/json;
            return 200 '{"status":"healthy","service":"Gateway-Nginx"}';
        }

        # Tanımsız istek — 404
        location / {
            return 404;
        }
    }
}
