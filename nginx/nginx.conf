events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # B3 — /public/ location, hiçbir backend'e gitmeden nginx'in kendi statik dosya
    # modülüyle servis ediyor; Content-Type'ı bu tablodan tahmin ediyor (mime.types
    # dahil edilmezse "text/plain"e düşerdi — private/ticket akışı bu sorunu yaşamaz
    # çünkü FileServiceApi Content-Type'ı zaten açıkça set ediyor, X-Accel öncesi).
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    proxy_connect_timeout  10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    # Docker embedded DNS — upstream blokları yerine değişken tabanlı proxy_pass kullanılır.
    # Bu sayede container rebuild/restart sonrasında nginx otomatik olarak yeni IP'yi çözer;
    # gateway restart artık gerekli değil.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Ticket indirme yolu için rate limit. Ticket'ın kendi doğal sınırları (kısa ömür,
    # RBAC, max-uses=20) sadece "bu ticket'a" özel; bu, IP başına genel bir throttle.
    # burst=50 + nodelay: gerçek testlerimizin en yoğunu (25 eşzamanlı + 22 ardışık
    # istek, proof/download-ticket-lease-model.md) rahatça geçer, gerçek kötüye
    # kullanım (yüzlerce/saniye) yine de sınırlanır.
    limit_req_zone $binary_remote_addr zone=download_limit:10m rate=30r/s;
    limit_req_status 429;
    # limit_req modülü, isteği reddettiğinde ham request satırını (tam ticket dahil)
    # KENDİ error_log formatıyla (log_format'tan bağımsız, sabit) yazar. Bu satırın
    # seviyesini varsayılan "error"dan "notice"e düşürerek, error_log'un varsayılan
    # "error" eşiğinin altında kalmasını ve hiç yazılmamasını sağlıyoruz — diğer gerçek
    # hata seviyeli loglar etkilenmiyor (error_log'un genel seviyesine dokunmadık).
    limit_req_log_level notice;

    # Ticket, URL path'inin parçası olduğu için access log'a ham haliyle yazılmaması
    # için ilk 8 karakter dışını maskeleyen özel bir log formatı. DB'de zaten sadece
    # hash tutuluyor (proof/download-ticket-sistemi.md → Test H); bu, Gateway'in KENDİ
    # log dosyasının da tam ticket'ı taşımamasını sağlıyor. Teknik/domain audit'i zaten
    # files.audit_events / yonetim.audit_events'te tam olarak var — bu log sadece HTTP
    # seviyesi trafik görünürlüğü için, ticket'ın kendisi için değil.
    map $ticket $ticket_masked {
        "~^(.{8})" "$1...";
        default    "(yok)";
    }
    log_format download_masked
        '$remote_addr - - [$time_local] "$request_method /files/download/$ticket_masked '
        '$server_protocol" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

    # HTTP → HTTPS yönlendirmesi (production: 80 açıksa çalışır)
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS — ana sunucu
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/gateway.crt;
        ssl_certificate_key /etc/nginx/certs/gateway.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Güvenlik header'ları. HSTS gerçek domain + güvenilir sertifika sonrası eklenmeli.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Upstream hata yanıtlarını JSON olarak dön
        error_page 502 = @upstream_down;
        error_page 503 = @upstream_down;
        error_page 504 = @upstream_timeout;
        error_page 429 = @rate_limited;

        location @upstream_down {
            default_type application/json;
            return 502 '{"error":"upstream_unavailable","reason":"service_unavailable"}';
        }

        location @upstream_timeout {
            default_type application/json;
            return 504 '{"error":"upstream_timeout","reason":"gateway_timeout"}';
        }

        location @rate_limited {
            # error_page 429 ile buraya internal yönlendirilen istekler /files/download/
            # location'ının kendi access_log'unu ATLAR (X-Accel-Redirect'in /protected-download/'a
            # yaptığı gibi) — bu yüzden maskeli log burada da ayrıca tanımlanmalı.
            access_log /dev/stdout download_masked;
            default_type application/json;
            return 429 '{"error":"too_many_requests","reason":"rate_limited"}';
        }

        # Güvenlik: FileServiceApi iç endpoint'leri asla dışarıya açılmaz
        location /internal/ {
            return 404;
        }

        # Ticket tüketme — FileServiceApi'yi mTLS ile (CN=gateway) çağırır,
        # dönen X-Accel-Redirect header'ı ile byte'ı /protected-download/ üzerinden
        # kendisi servis eder. FileServiceApi/YonetimApi byte'ı hiç görmez.
        location ~ ^/files/download/(?<ticket>[A-Za-z0-9_-]+)$ {
            limit_req zone=download_limit burst=50 nodelay;
            # Bu access_log, sadece X-Accel-Redirect TETİKLENMEYEN yanıtları (403 yanlış
            # CN, 404 geçersiz/süresi dolmuş ticket, 429 rate limit) kapsar — başarılı
            # (200/206/304) yanıtlar nginx'in internal redirect'i yüzünden
            # /protected-download/ location'ında loglanıyor (aşağıya bakın).
            access_log /dev/stdout download_masked;
            proxy_pass https://fileservice:8080/internal/download-tickets/$ticket/consume;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header If-None-Match $http_if_none_match;
            proxy_ssl_certificate     /etc/nginx/certs/gateway-client.crt;
            proxy_ssl_certificate_key /etc/nginx/certs/gateway-client.key;
            proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
            proxy_ssl_verify        on;
            proxy_ssl_verify_depth  2;
            proxy_ssl_server_name   on;
            proxy_ssl_name          fileservice;
        }

        # Sadece X-Accel-Redirect ile erişilebilir — dışarıdan asla doğrudan
        # istek kabul etmez (internal direktifi).
        location /protected-download/ {
            internal;
            alias /protected-files/;
            # X-Accel-Redirect ile buraya internal yönlendirilen BAŞARILI (200/206/304)
            # yanıtlar burada finalize ediliyor — asıl access_log burada olmalı, $ticket
            # (ve ondan türeyen $ticket_masked) named-capture'ı /files/download/ location'ından
            # bu internal redirect'e taşınıyor, doğrulandı.
            access_log /dev/stdout download_masked;
        }

        # B3 — public zone: kimlik doğrulaması YOK (ticket/JWT/mTLS gerekmez, bilinçli —
        # public olmanın tanımı bu). FileServiceApi/ticket store veri yolunda değil, nginx
        # doğrudan salt-okunur mount'tan servis ediyor. Sadece "official" sınıflandırmalı,
        # açıkça public işaretlenmiş dosyalar bu fiziksel dizinde bulunur (bkz. FileEndpoints.cs
        # zone_classification_mismatch kontrolü) — private dosyalar burada FİZİKSEL OLARAK YOK.
        location /public/ {
            alias /public-files/;
            limit_except GET HEAD { deny all; }
            autoindex off;
        }

        # Auth (BFF login/refresh/logout) — YonetimApi
        location /api/auth {
            set $backend http://yonetimapi:8080;
            proxy_pass          $backend;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # Personnel — YonetimApi
        location /api/personnel {
            set $backend http://yonetimapi:8080;
            proxy_pass          $backend;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            client_max_body_size    20m;
            proxy_request_buffering off;
            proxy_buffering         off;
        }

        # Vehicles — FlotaApi
        location /api/vehicles {
            set $backend http://flotaapi:8080;
            proxy_pass          $backend;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            client_max_body_size    25m;
            proxy_request_buffering off;
            proxy_buffering         off;
        }

        # Ops API — auth OpsApi içinde yapılır (ops.read/ops.execute/ops.admin)
        location /ops/ {
            set $backend http://opsapi:8080;
            proxy_pass          $backend;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # Health check
        location = /health {
            default_type application/json;
            return 200 '{"status":"healthy","service":"Gateway-Nginx"}';
        }

        # React SPA — client container
        location / {
            set $backend http://client:80;
            proxy_pass          $backend;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
